<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Justin Ray | AI Music Producer & Hybrid Audio Engineer</title>
    <meta name="description" content="Justin Ray is a Hybrid Producer and software developer blending Generative AI with traditional engineering. Offering AI music mixing and vocal cleanup, while building innovative tools like in-browser DAWs, polyphonic synths, and web-based image editors." />
    <meta name="keywords" content="AI music producer, Suno audio editor, in-browser DAW, polyphonic web synth, React audio developer, hybrid production, AI vocal cleanup, web based photoshop tool" />
    <meta name="author" content="Justin Ray" />
    
    <!-- Favicon: White Waveform on Chip -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='10' y='10' width='80' height='80' rx='15' fill='none' stroke='%23ffffff' stroke-width='8'/%3E%3Cpath d='M20 50 H30 L40 20 L60 80 L70 50 H80' fill='none' stroke='%23ffffff' stroke-width='8' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f0f0f; 
      }
      ::-webkit-scrollbar-thumb {
        background: #333; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #555; 
      }
      
      /* Oil Paint Animation Keyframes */
      @keyframes drift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      
      .oil-bg-animate {
        background-size: 200% 200%;
        animation: drift 20s ease infinite;
      }

      /* Animation Utilities */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .animate-fade-in-up {
        animation: fadeInUp 0.8s ease-out forwards;
      }

      @keyframes slideInRight {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }

      .animate-slide-in-right {
        animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .animate-fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }

      .text-stroke {
        -webkit-text-stroke: 1px rgba(255, 255, 255, 0.2);
        color: transparent;
      }
      
      .animate-spin-slow {
        animation: spin 8s linear infinite;
      }
      
      .bg-grid-pattern {
        background-image: linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        background-size: 30px 30px;
      }
    </style>
  </head>
  <body class="bg-black text-white antialiased overflow-x-hidden">
    <div id="root"></div>
    
    <!-- Global SVG Filters for Effects - OPTIMIZED -->
    <!-- Reduced octaves in feTurbulence significantly improves rendering performance on low-end devices -->
    <svg style="position: absolute; width: 0; height: 0; overflow: hidden;" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
      <defs>
        <filter id="oil-paint">
          <!-- Reduced octaves from 5 to 2 for performance -->
          <feTurbulence type="turbulence" baseFrequency="0.006" numOctaves="2" result="turbulence"/>
          <!-- Adjusted scale slightly to compensate for lower detail -->
          <feDisplacementMap in2="turbulence" in="SourceGraphic" scale="25" xChannelSelector="R" yChannelSelector="G"/>
          <!-- Removed feGaussianBlur to save a pass; turbulence provides enough distortion -->
          <feColorMatrix type="saturate" values="1.3"/>
        </filter>
        <filter id="noise">
           <!-- Reduced octaves from 3 to 1 for background noise -->
           <feTurbulence type="fractalNoise" baseFrequency="0.80" numOctaves="1" stitchTiles="stitch"/>
        </filter>
      </defs>
    </svg>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
